name: 'Deploy Time Trace'

on:
 workflow_run:
   workflows: ['Deploy Doxygen']
   types:
     - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
      with:
        egress-policy: audit
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: 'Install: Latest CMake'
      uses: ssrobins/install-cmake@da13ba26f50a41d3b03cfe8ca7265903f04a8932 # v1.0.0
    - name: 'Install: Clang 21'
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 21 all
    - name: 'Configure'
      env:
        CXX: 'clang++-21'
        CXXFLAGS: '-O0 -g -ftime-trace'
      run: cmake -S . -B 'build'
    - name: 'Build'
      run: cmake --build 'build' --verbose --parallel 4
    - name: 'Retain Traces'
      run: |
        rm -rf 'build/_deps'
        find 'build' -type f ! -name '*.cpp.json' -delete
        find 'build' ! -type f ! -type d -delete
        mapfile -d '' files < <(find build -type f -print0); for file in "${files[@]}"; do mv "$file" "$(dirname "$file")/../.."; done
        find 'build' -type d -empty -delete
    - name: Deploy
      uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./build
        destination_dir: ./time_trace
