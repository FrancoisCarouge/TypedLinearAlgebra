name: 'Deploy Time Trace'

on:
 workflow_run:
   workflows: ['Deploy Doxygen']
   types:
     - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
      with:
        egress-policy: audit
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: 'Install: Latest CMake'
      uses: ssrobins/install-cmake@da13ba26f50a41d3b03cfe8ca7265903f04a8932 # v1.0.0
    - name: 'Install: Clang 21'
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 21 all
    - name: 'Configure'
      env:
        CXX: 'clang++-21'
        CXXFLAGS: '-O0 -g -ftime-trace'
      run: cmake -S . -B 'build'
    - name: 'Build'
      run: cmake --build 'build' --verbose --parallel 4
    - name: 'Retain Traces'
      run: |
        rm -rf 'build/_deps'
        find 'build' -type f ! -name '*.cpp.json' -delete
        find 'build' ! -type f ! -type d -delete
        mapfile -d '' files < <(find build -type f -print0); for file in "${files[@]}"; do mv "$file" "$(dirname "$file")/../.."; done
        find 'build' -type d -empty -delete
    - name: Deploy
      uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./build
        destination_dir: ./time_trace
