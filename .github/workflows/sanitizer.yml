name: 'Sanitizer'

on:
  push:
    branches: [ 'master' ]
  pull_request:
    branches: [ 'master' ]
  schedule:
  - cron: '0 0 * * */5'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        sanitizer:
        - name: 'Address'
          cpp_flags: '-fsanitize=address -O0 -g -fno-sanitize-recover=all -fno-omit-frame-pointer'
          run_flags: 'ASAN_OPTIONS=verbosity=1:abort_on_error=1:strict_string_checks=1:detect_stack_use_after_return=1:check_initialization_order=1:strict_init_order=1'
        - name: 'Leak'
          cpp_flags: '-fsanitize=leak -O0 -g -fno-sanitize-recover=all -fno-omit-frame-pointer'
          run_flags: 'LSAN_OPTIONS=verbosity=1:abort_on_error=1'
        - name: 'Thread'
          cpp_flags: '-fsanitize=thread -O0 -g -fno-sanitize-recover=all -fno-omit-frame-pointer'
          run_flags: 'TSAN_OPTIONS=verbosity=1:abort_on_error=1'
        - name: 'Type'
          cpp_flags: '-fsanitize=type -O0 -g -fno-sanitize-recover=all -fno-omit-frame-pointer -fno-optimize-sibling-calls'
          run_flags: 'TYSAN_OPTIONS=verbosity=1:abort_on_error=1:print_stacktrace=1'
        - name: 'Undefined'
          cpp_flags: '-fsanitize=undefined -O0 -g -fno-sanitize-recover=all -fno-omit-frame-pointer'
          run_flags: 'UBSAN_OPTIONS=verbosity=1:abort_on_error=1'
    name: '${{ matrix.sanitizer.name }}'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      CXXFLAGS: '${{ matrix.sanitizer.cpp_flags }}'
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit
    - name: 'Checkout'
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    - name: 'Install: Latest CMake'
      uses: ssrobins/install-cmake@da13ba26f50a41d3b03cfe8ca7265903f04a8932 # v1.0.0
    - name: 'Install: Clang 21'
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 21 all
    - name: 'Configure'
      env:
        CXX: 'clang++-21'
        CC: 'clang-21'
      run: cmake -S . -B 'build'
    - name: 'Build'
      run: cmake --build 'build' --verbose --parallel 4
    - name: 'Test'
      run: ${{ matrix.sanitizer.run_flags }} ctest --test-dir 'build' --timeout 30 --verbose --parallel 1
