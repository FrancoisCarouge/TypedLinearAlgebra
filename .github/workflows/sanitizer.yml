name: 'Sanitizer'

on:
  push:
    branches: [ 'master' ]
  pull_request:
    branches: [ 'master' ]
  schedule:
  - cron: '0 0 * * */5'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        sanitizer:
        - name: 'Address'
          cpp_flags: '-fsanitize=address -O0 -g'
          run_flags: 'ASAN_OPTIONS=verbosity=1:strict_string_checks=1:detect_stack_use_after_return=1:check_initialization_order=1:strict_init_order=1'
        - name: 'Leak'
          cpp_flags: '-fsanitize=leak -O0 -g'
          run_flags: 'LSAN_OPTIONS=verbosity=1'
        - name: 'Realtime'
          cpp_flags: '-g -O0 -fsanitize=realtime -Wfunction-effects'
          run_flags: 'RTSAN_OPTIONS=verbosity=1'
          instrument: 'find . -name "*.cpp" -exec sed --in-place "s/test{\[\]/test{\[\]\(\) noexcept \[\[clang::nonblocking\]\]/g" {} +'
        - name: 'Thread'
          cpp_flags: '-fsanitize=thread -O0 -g'
          run_flags: 'TSAN_OPTIONS=verbosity=1'
        - name: 'Undefined'
          cpp_flags: '-fsanitize=undefined -O0 -g'
          run_flags: 'UBSAN_OPTIONS=verbosity=1'
    name: '${{ matrix.sanitizer.name }}'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      CXXFLAGS: '${{ matrix.sanitizer.cpp_flags }}'
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit
    - name: 'Checkout'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: 'Install: Latest CMake'
      uses: ssrobins/install-cmake@da13ba26f50a41d3b03cfe8ca7265903f04a8932 # v1.0.0
    - name: 'Install: Clang 21'
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 21 all
    - name: 'Instrument'
      run: '${{ matrix.sanitizer.instrument }}'
    - name: 'Configure'
      env:
        CXX: 'clang++-21'
        CC: 'clang-21'
      run: cmake -S . -B 'build'
    - name: 'Build'
      run: cmake --build 'build' --verbose --parallel 4
    - name: 'Test'
      run: ${{ matrix.sanitizer.run_flags }} ctest --test-dir 'build' --timeout 30 --tests-regex 'typed_linear_algebra_test' --verbose --parallel 4
